name: Monthly Dependency Update

# Fires at 02:00 UTC on the 1st of every month.
# Can also be triggered manually from the GitHub Actions UI (workflow_dispatch).
on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

# Needs write access to push the updated pom.xml / CHANGELOG.md
permissions:
  contents: write

jobs:
  update:
    name: Update dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 90     # native build can take 30+ min on cloud runners

    steps:
      # ---------------------------------------------------------------
      # 1. Checkout with a token that allows pushing back to the repo
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # full history so git log works in the prompt

      # ---------------------------------------------------------------
      # 2. Guard — skip everything if a run occurred in the past 7 days.
      #    Reads the most recent dated entry from CHANGELOG.md.
      #    Sets output: skip=true|false
      # ---------------------------------------------------------------
      - name: Check for recent run
        id: recency_check
        run: |
          CHANGELOG="CHANGELOG.md"
          SKIP="false"

          if [ -f "$CHANGELOG" ]; then
            LAST_DATE=$(grep -m1 "^## [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]" "$CHANGELOG" \
              | grep -oE "[0-9]{4}-[0-9]{2}-[0-9]{2}" || true)

            if [ -n "$LAST_DATE" ]; then
              LAST_EPOCH=$(date -d "$LAST_DATE" +%s 2>/dev/null || echo 0)
              SEVEN_AGO=$(date -d "7 days ago" +%s)

              if [ "$LAST_EPOCH" -gt "$SEVEN_AGO" ]; then
                echo "Last run: $LAST_DATE — within 7 days. Skipping update."
                SKIP="true"
              else
                echo "Last run: $LAST_DATE — older than 7 days. Proceeding."
              fi
            else
              echo "No dated entry found in CHANGELOG.md. Proceeding."
            fi
          else
            echo "CHANGELOG.md not found. Proceeding."
          fi

          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 3. GraalVM 25 — required for both JVM (Java 25) and native build
      # ---------------------------------------------------------------
      - name: Set up GraalVM 25
        if: steps.recency_check.outputs.skip != 'true'
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      # ---------------------------------------------------------------
      # 4. Configure git so Claude can commit and push
      # ---------------------------------------------------------------
      - name: Configure git identity
        if: steps.recency_check.outputs.skip != 'true'
        run: |
          git config user.name  "jsbt0-bot"
          git config user.email "jsbt0-bot@users.noreply.github.com"

      # ---------------------------------------------------------------
      # 5. Install the Claude Code CLI
      # ---------------------------------------------------------------
      - name: Install Claude Code CLI
        if: steps.recency_check.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code

      # ---------------------------------------------------------------
      # 6. Run the update — Claude researches, edits, builds, and pushes
      # ---------------------------------------------------------------
      - name: Run monthly dependency update
        if: steps.recency_check.outputs.skip != 'true'
        run: |
          claude -p "$(cat scripts/update-prompt.md)" \
            --dangerously-skip-permissions \
            --max-turns 80 \
            --model claude-opus-4-6
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # JAVA_HOME is set by graalvm/setup-graalvm — Claude's prompt reads it
          JAVA_HOME: ${{ env.JAVA_HOME }}
